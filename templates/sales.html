{%extends 'base.html' %}
{% block title %}Sales{% endblock %}
{% block content %}
<div>
    <h1>The Sales</h1>
</div>
    <div>
        <table id="example" class="table table-striped">
        <thead>
            <tr>
                <th>Sales ID</th>
                <th>Product ID</th>
                <th>Quantity</th>
                <th>Date of sale</th>
            </tr>
        </thead>
        <tbody>

        {% for sales in sales_data %}
            <tr>
                <td>{{sales [0]}}</td>
                <td>{{sales [1]}}</td></td>
                <td>{{sales [2]}}</td></td>
                <td>{{sales [3]}}</td></td>
            </tr>
            {% endfor %}
        </tbody>
        </table>
    </div>


{% endblock %}
